name: Release

on:
  push:
    branches:
      - master

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          manifest-file: .release-please-manifest.json
          config-file: release-please-config.json
          
  build-and-upload:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
          
      - name: Build Packages
        run: mvn clean package -DskipTests
        
      - name: Upload Artifacts to Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Use the tag name from the main package release
          TAG_NAME="${{ needs.release-please.outputs.tag_name }}"
          
          # Find and upload backend jar
          BACKEND_JAR=$(find backend/target -maxdepth 1 -name "backend-*.jar" | head -n 1)
          cp $BACKEND_JAR inventory-manager-backend.jar
          
          # Find and upload frontend jar (excluding original-*)
          FRONTEND_JAR=$(find frontend/target -maxdepth 1 -name "frontend-*.jar" ! -name "original-*" | head -n 1)
          cp $FRONTEND_JAR inventory-manager-frontend.jar
          
          gh release upload "$TAG_NAME" inventory-manager-backend.jar inventory-manager-frontend.jar --clobber
