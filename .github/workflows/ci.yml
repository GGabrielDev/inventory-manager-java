name: CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
    types: [opened, edited, synchronized]

permissions:
  pull-requests: read
  contents: read

jobs:
  # 1. Ensure PR titles follow Conventional Commits so Release Please works
  lint-pr-title:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 2. Ensure all modules have the same version
  version-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Verify Version Sync
        run: |
          ROOT_VER=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          BACKEND_VER=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout -pl backend)
          FRONTEND_VER=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout -pl frontend)
          
          echo "Root: $ROOT_VER, Backend: $BACKEND_VER, Frontend: $FRONTEND_VER"
          
          if [ "$ROOT_VER" != "$BACKEND_VER" ] || [ "$ROOT_VER" != "$FRONTEND_VER" ]; then
            echo "ERROR: Version mismatch detected between modules!"
            exit 1
          fi

  # 3. Standard build and test
  build-and-test:
    needs: [version-guard]
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
        
    - name: Build and Verify
      run: mvn clean verify
