name: '🛡️ Gemini Hard Guard'

on:
  workflow_dispatch:

permissions:
  contents: 'read'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  adversary-agent:
    name: 'Adversary Agent'
    runs-on: 'ubuntu-latest'
    timeout-minutes: 25
    permissions:
      contents: 'read'
      id-token: 'write'
    steps:
      - name: 'Checkout repository'
        uses: 'actions/checkout@v4'
        with:
          fetch-depth: 0

      - name: 'Set up JDK 21'
        uses: 'actions/setup-java@v4'
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: 'Prepare PR context'
        run: |
          mkdir -p .gemini
          git fetch --no-tags origin "${{ github.base_ref }}" --depth=1
          git diff --name-only "origin/${{ github.base_ref }}"...HEAD > .gemini/changed-files.txt

      - name: 'Run Gemini adversary agent'
        id: 'gemini_adversary'
        uses: 'google-github-actions/run-gemini-cli@v0' # ratchet:exclude
        env:
          GEMINI_API_KEY: '${{ secrets.GEMINI_API_KEY }}'
          GEMINI_CLI_TRUST_WORKSPACE: 'true'
        with:
          gcp_location: '${{ vars.GOOGLE_CLOUD_LOCATION }}'
          gcp_project_id: '${{ vars.GOOGLE_CLOUD_PROJECT }}'
          gcp_service_account: '${{ vars.SERVICE_ACCOUNT_EMAIL }}'
          gcp_workload_identity_provider: '${{ vars.GCP_WIF_PROVIDER }}'
          gemini_api_key: '${{ secrets.GEMINI_API_KEY }}'
          gemini_cli_version: '${{ vars.GEMINI_CLI_VERSION }}'
          gemini_debug: '${{ fromJSON(vars.GEMINI_DEBUG || vars.ACTIONS_STEP_DEBUG || false) }}'
          gemini_model: '${{ vars.GEMINI_MODEL }}'
          google_api_key: '${{ secrets.GOOGLE_API_KEY }}'
          use_gemini_code_assist: '${{ vars.GOOGLE_GENAI_USE_GCA }}'
          use_vertex_ai: '${{ vars.GOOGLE_GENAI_USE_VERTEXAI }}'
          upload_artifacts: '${{ vars.UPLOAD_ARTIFACTS }}'
          workflow_name: 'gemini-hard-guard-adversary'
          settings: |-
            {
              "model": {
                "maxSessionTurns": 20
              },
              "telemetry": {
                "enabled": true,
                "target": "local",
                "outfile": ".gemini/telemetry.log"
              },
              "tools": {
                "core": [
                  "run_shell_command(bash)",
                  "run_shell_command(cat)",
                  "run_shell_command(echo)",
                  "run_shell_command(find)",
                  "run_shell_command(grep)",
                  "run_shell_command(head)",
                  "run_shell_command(mvn)",
                  "run_shell_command(sed)",
                  "run_shell_command(tail)",
                  "run_shell_command(tee)",
                  "run_shell_command(test)",
                  "run_shell_command(tr)"
                ]
              }
            }
          prompt: '/gemini-hard-adversary'

      - name: 'Enforce adversary verdict'
        run: |
          STATUS_FILE=".gemini/adversary.status"
          REPORT_FILE=".gemini/adversary-report.md"
          test -f "$STATUS_FILE" || { echo "Missing $STATUS_FILE"; exit 1; }
          STATUS=$(tr -d ' \r\n' < "$STATUS_FILE")

          if [ "$STATUS" = "PASS" ]; then
            echo "Adversary verdict: PASS"
            exit 0
          fi

          echo "Adversary verdict: FAIL"
          test -f "$REPORT_FILE" && cat "$REPORT_FILE"
          exit 1

  architecture-agent:
    name: 'Architecture Agent'
    runs-on: 'ubuntu-latest'
    timeout-minutes: 25
    permissions:
      contents: 'read'
      id-token: 'write'
    steps:
      - name: 'Checkout repository'
        uses: 'actions/checkout@v4'
        with:
          fetch-depth: 0

      - name: 'Prepare PR context'
        run: |
          mkdir -p .gemini
          git fetch --no-tags origin "${{ github.base_ref }}" --depth=1
          git diff --name-only "origin/${{ github.base_ref }}"...HEAD > .gemini/changed-files.txt

      - name: 'Run Gemini architecture agent'
        id: 'gemini_architecture'
        uses: 'google-github-actions/run-gemini-cli@v0' # ratchet:exclude
        env:
          GEMINI_API_KEY: '${{ secrets.GEMINI_API_KEY }}'
          GEMINI_CLI_TRUST_WORKSPACE: 'true'
        with:
          gcp_location: '${{ vars.GOOGLE_CLOUD_LOCATION }}'
          gcp_project_id: '${{ vars.GOOGLE_CLOUD_PROJECT }}'
          gcp_service_account: '${{ vars.SERVICE_ACCOUNT_EMAIL }}'
          gcp_workload_identity_provider: '${{ vars.GCP_WIF_PROVIDER }}'
          gemini_api_key: '${{ secrets.GEMINI_API_KEY }}'
          gemini_cli_version: '${{ vars.GEMINI_CLI_VERSION }}'
          gemini_debug: '${{ fromJSON(vars.GEMINI_DEBUG || vars.ACTIONS_STEP_DEBUG || false) }}'
          gemini_model: '${{ vars.GEMINI_MODEL }}'
          google_api_key: '${{ secrets.GOOGLE_API_KEY }}'
          use_gemini_code_assist: '${{ vars.GOOGLE_GENAI_USE_GCA }}'
          use_vertex_ai: '${{ vars.GOOGLE_GENAI_USE_VERTEXAI }}'
          upload_artifacts: '${{ vars.UPLOAD_ARTIFACTS }}'
          workflow_name: 'gemini-hard-guard-architecture'
          settings: |-
            {
              "model": {
                "maxSessionTurns": 20
              },
              "telemetry": {
                "enabled": true,
                "target": "local",
                "outfile": ".gemini/telemetry.log"
              },
              "tools": {
                "core": [
                  "run_shell_command(bash)",
                  "run_shell_command(cat)",
                  "run_shell_command(echo)",
                  "run_shell_command(find)",
                  "run_shell_command(grep)",
                  "run_shell_command(head)",
                  "run_shell_command(sed)",
                  "run_shell_command(tail)",
                  "run_shell_command(test)",
                  "run_shell_command(tr)"
                ]
              }
            }
          prompt: '/gemini-hard-auditor'

      - name: 'Enforce architecture verdict'
        run: |
          STATUS_FILE=".gemini/auditor.status"
          REPORT_FILE=".gemini/auditor-report.md"
          test -f "$STATUS_FILE" || { echo "Missing $STATUS_FILE"; exit 1; }
          STATUS=$(tr -d ' \r\n' < "$STATUS_FILE")

          if [ "$STATUS" = "PASS" ]; then
            echo "Architecture verdict: PASS"
            exit 0
          fi

          echo "Architecture verdict: FAIL"
          test -f "$REPORT_FILE" && cat "$REPORT_FILE"
          exit 1
